<html lang="en">
    <head>
    <link rel="stylesheet" href="hw3.css"> <!-- links to css file-->
    <!--text displayed in browser tab-->
    <title>New Patient Registration | Kurian Clinic</title>
</head>
<body>
    <header>
    <table width="100%">
        <tr>
            <td valign="top" align="left" width="20%">
                <div class="image">
                    <img align="center" src="KurianClinic.png" alt="Kurian Clinic Logo" width="180px" id="logo"/>
                </div>
            </td>
            <td>
                <h2>Kurian Clinic</h2>
            </td>
            <td valign="bottom" align="right" width="20%">
                <p>Today's Date: <span id="todaydate"></span></p>
            </td>
        </tr>
    </table>
</header>
<hr>
<!--form starts here-->
<form name="signup" id="signup" form action="thankyou.html">
    <center>
        <div class="format">
            <table>
                <tr>
                    <th colspan="4">Create Account</th>
                </tr>
                <!--patients information section starts-->

                <!--patients name F,M,L-->
                <tr>
                    <td class="td1"><label for="fname">First Name:</label></td>
                    <td>
                        <input
                        type="text"
                        name="fname"
                        id="fname"
                        minlength="1"
                        maxlength="30"
                        required
                        pattern="[a-zA-Z']{1,30}"
                        title="Letter, apostrophes, and dashes only"
                        onblur="validateFname()"
                        placeholder="Abel"
                         />
                        <span class="error" id="fname-error"></span>
                    </td>
                </tr>
                <tr>
                    <td class="td1"><label for="mname">Middle Initial:</label></td>
                    <td>
                        <input
                        type="text"
                        name="mname"
                        id="mname"
                        maxlength="1"
                        title="Letters only"
                        pattern="[a-zA-Z']{0,1}"
                        onblur="validateMname()"
                        placeholder="K"
                        />
                        <span class="error" id="mname-error"></span>
                    </td>
                </tr>
                <tr>
                    <td class="td1"><label for="lname">Last Name:</label></td>
                    <td>
                        <input
                        type="text"
                        name="lname"
                        id="lname"
                        minlength="1"
                        maxlength="30"
                        required
                        title="Letter, apostrophes, and dashes only"
                        pattern="[a-zA-Z']{1,30}"
                        onblur="validateLname()"
                        placeholder="Kurian"
                        />
                        <span class="error" id="lname-error"></span>
                    </td>
                </tr>
                <!--Gender section starts here-->
                <tr>
                    <td class="td1"><label for="pgender">Gender:</label></td>
                    <td>
                        <input type="radio" id="g1" name="pgender" value="Male"> Male
                        <input type="radio" id="g2" name="pgender" value="Female"> Female
                        <input type="radio" id="g3" name="pgender" value="Other"> Other
                    </td>
                </tr>
                <!--patients date of birth-->
                <tr>
                    <td class="td1"><label for="dob">Date of Birth:</label></td>
                    <td>
                        <input
                        type="date"
                        id="dob"
                        name="dob"
                        onblur="validateDob()"
                        required
                        />
                        <span class="error" id="dob-error"></span>
                    </td>
                </tr>
                
                <tr>
                    <td class="td1"><label for="ssn">Social Security Number:</label></td>
                    <td>
                        <input
                        type="password"
                        minlength="9"
                        maxlength="11"
                        name="ssn"
                        id="ssn"
                        required
                        title="Numbers only"
                        placeholder="123-45-6789"
                        onblur="validateSsn()"
                        />
                        <span class="error" id="ssn-error"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!--separates sections-->
                </tr>

                <tr>
                    <th colspan="4">Patient Contact Information</th> 
                </tr>
                <!--Address section starts here--> 
                <tr>
		            <td class="td1"><label for="address1">Address:</label></td>
                    <td>
                        <input
                        type="text"
                        name="address1"
                        id="address1"
                        minlength="2"
                        maxlength="30"
                        required
                        title="Please enter your address"
                        placeholder="1600 Pennsylvania Ave NW"
                        onblur="validateAddress1()"
                        />
                        <span class="error" id="address1-error"></span>
                    </td>
                </tr>
                <tr>
		            <td class="td1"><label for="address2">Address:</label></td>
                    <td>
                        <input type="text" 
                        name="address2" 
                        id="address2" 
                        maxlength="30"
                        title="Please enter your address" 
                        placeholder="1111 Dairy Ashford Rd"
                        />
                    </td>
                </tr>
                <tr>
		            <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input type="text" 
                        name="city" 
                        id="city" 
                        maxlength="30"
                        title="Please enter your city" 
                        required
                        placeholder="Houston"
                        onblur="validateCity()"
                        />
                        <span class="error" id="city-error"></span>
                    </td>
                </tr>
                <!--state-->
           <tr>
           <td class="td1"><label for="state">State:<Label></td>
           <td>
	       <select name="state" id="state" required title="Please select your state">
           <option selected disabled>Please Select One</option>
           <option value="AL">Alabama</option>
           <option value="AK">Alaska</option>
           <option value="AZ">Arizona</option>
           <option value="AR">Arkansas</option>
           <option value="CA">California</option>
           <option value="CO">Colorado</option>
           <option value="CT">Connecticut</option>
           <option value="DE">Delaware</option>
           <option value="DC">District of Columbia</option>
           <option value="FL">Florida</option>
           <option value="GA">Georgia</option>
           <option value="GU">Guam</option>	
           <option value="HI">Hawaii</option>	
           <option value="ID">Idaho</option>	
           <option value="IL">Illinois</option>	
           <option value="IN">Indiana</option>	
           <option value="IA">Iowa</option>	
           <option value="KS">Kansas</option>	
           <option value="KY">Kentucky</option>	
           <option value="LA">Louisiana</option>	
           <option value="ME">Maine</option>	
           <option value="MD">Maryland</option>	
           <option value="MA">Massachusetts</option>	
           <option value="MI">Michigan</option>	
           <option value="MN">Minnesota</option>	
           <option value="MS">Mississippi</option>	
           <option value="MO">Missouri</option>
           <option value="MT">Montana</option>
           <option value="NE">Nebraska</option>
           <option value="NV">Nevada</option>	
           <option value="NH">New Hampshire</option>	
           <option value="NJ">New Jersey</option>	
           <option value="NM">New Mexico</option>	
           <option value="NY">New York</option>	
           <option value="NC">North Carolina</option>	
           <option value="ND">North Dakota</option>	
           <option value="OH">Ohio</option>	
           <option value="OK">Oklahoma</option>	
           <option value="OR">Oregon</option>	
           <option value="PA">Pennsylvania</option>	
           <option value="PR">Puerto Rico</option>	
           <option value="RI">Rhode Island</option>	
           <option value="SC">South Carolina</option>	
           <option value="SD">South Dakota</option>	
           <option value="TN">Tennessee</option>	
           <option value="TX">Texas</option>	
           <option value="UT">Utah</option>	
           <option value="VT">Vermont</option>	
           <option value="VA">Virginia</option>	
           <option value="WA">Washington</option>	
           <option value="WV">West Virginia</option>	
           <option value="WI">Wisconsin</option>	
           <option value="WY">Wyoming</option>	
        </select>
       </td>
        </tr>

        <tr>
		            <td class="td1"><label for="zcode">Zip Code:</label></td>
                    <td>
                        <input
                        type="text"
                        name="zcode"
                        id="zcode"
                        minlength="5"
                        maxlength="10"
                        required
                        title="Numbers and a dash only"
                        placeholder="12345"
                        pattern="^\d{5}(-\d{4})?$"
                        onblur="validateZcode()"
                        />
                        <span class="error" id="zcode-error"></span>
                    </td>
                </tr>

                <tr>
		            <td class="td1"><label for="email">Email Address:</label></td>
                    <td>
                        <input type="text" 
                        name="email" 
                        id="email" 
                        required
                        maxlength="30"
                        title="Please enter your email address" 
                        placeholder="name@domain.tld"
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
                        onblur="validateEmail()"
                        />
                        <span class="error" id="email-error"></span>
                    </td>
                </tr>

                <tr>
		            <td class="td1"><label for="phonen">Phone Number:</label></td>
                    <td>
                        <input type="text" 
                        name="phonen" 
                        id="phonen" 
                        required
                        maxlength="12"
                        title="Please enter your phone number" 
                        placeholder="123-456-7890"
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                        onblur="validatePhone()"
                        />
                        <span class="error" id="phonen-error"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!--separates sections-->
                </tr>
                <!--patient history-->
                <tr>
                    <th colspan="4">Patient History</th> 
                </tr>

                <tr>
                    <td class="td1"><label for="vacc">Have you been vaccinated:</label></td>
                    <td>
                        <input type="radio" id="v1" name="vacc" value="Yes"> Yes
                        <input type="radio" id="v2" name="vacc" value="No"> No
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="insur">Do you have insurance:</label></td>
                    <td>
                        <input type="radio" id="i1" name="insur" value="Yes"> Yes
                        <input type="radio" id="i2" name="insur" value="No"> No
                    </td>
                </tr>

<tr>
    <td class="td1"><label for="symp">Current Symptoms:</label></td>
    <td>
        <input type="checkbox" id="option1" name="option1" value="Sore Throat"> Sore Throat
        <input type="checkbox" id="option2" name="option2" value="Fever"> Fever
        <input type="checkbox" id="option3" name="option3" value="Headache"> Headache
        <input type="checkbox" id="option4" name="option4" value="Cough"> Cough
        <input type="checkbox" id="option5" name="option5" value="Shortness of Breath"> Shortness of Breath
        <input type="checkbox" id="option6" name="option6" value="None"> None
    </td>
</tr>

<tr>
    <td class="td1" align="right">
        <label for="notes">Additional Notes:</label></td>
    <td>
        <textarea id="notes" name="notes" rows="4" cols="50" maxlength="500" placeholder="Enter any additional symptoms, medical history or concerns here..."></textarea>
        <span id="description_test"></span>
    </td>
</tr>
<!--Slider-->
<tr>
    <td class="td1"><label for="range">How much pain are you in?<br/>(Rate from 0 to 10)</label></td>
    <td>
	    <input
	     type="range"
	     name="range"
	     id="range"
        min="0"
        max="10"
        value="0"
       />
       <span id="range-slider"></span>
     </td>
</tr>

<tr>
    <th colspan="4"><hr></th> <!--separates sections-->
</tr>
    <!--patient login-->
<tr>
    <th colspan="4">Make a Patient Account</th> 
</tr>

<tr>
		<td class="td1"><label for="username">User ID:</label></td>
            <td>
                        <input type="text" 
                        name="username" 
                        id="username" 
                        required
                        minlength="5"
                        maxlength="30"
                        title="Username must have at least 5 characters, and cannot start with a number" 
                        placeholder="Enter a unique username"
                        onblur="validateUsername()"
                        />
                        <span class="error" id="username-error"></span>
            </td>
</tr>

<tr>
		<td class="td1"><label for="pass">Password:</label></td>
            <td>
                        <input type="password" 
                        name="pass" 
                        id="pass" 
                        required
                        minlength="8"
                        maxlength="30"
                        title="Passwords must be at least 8 characters and contain at least 1 upper case letter, 1 number and 1 special character." 
                        placeholder="Enter a unique password"
                        onblur="validatePass()"
                        oninput="validatePass()"
                        onfocus="validatePass()"
                        />
                        <span class="error" id="pass-error"></span>
            </td>
</tr>

<tr>
		<td class="td1"><label for="cpass">Confirm Password:</label></td>
            <td>
                        <input type="password" 
                        name="cpass" 
                        id="cpass" 
                        required
                        minlength="8"
                        maxlength="30"
                        title="Please re-enter your password" 
                        placeholder="re-enter your password"
                        onblur="validateCpass()"
                        oninput="validateCpass()"
                        onfocus="validateCpass()"
                        />
                        <span class="error" id="cpass-error"></span>
            </td>
</tr>

<tr>
    <td class="td1" colspan="4">
        <center>

<input type="submit" name="submit" id="submit">
&nbsp;&nbsp;&nbsp;
<input type="reset" name="reset" id="reset">
&nbsp;&nbsp;&nbsp;
<input type="button" name="review" id="review" value="Review" onclick="reviewInput()" />
&nbsp;&nbsp;&nbsp;
<input type="button" name="validate" id="validate" value="Validate" onclick="validateForm()" />

        </center>
    </td>
</tr>
            </table>
</div>
        <div class="pass-message">
        <span id="msg1"></span> <br/>
        <span id="msg2"></span> <br/>
        <span id="msg3"></span> <br/>
        <span id="msg4"></span> <br/>
        <span id="msg5"></span> <br/>
        <span id="msg6"></span> <br/>
        <span id="msg7"></span> <br/>
        <span id="cpass-error"></span> <br/>
</div>
    <center>
        <p id="showInput"></p>
    <center>

</center>
</form>

<footer>
    <p id="footer">&#169 2026 Kurian Clinic <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" rel="noopener noreferrer" >Contact Us!</a></p>
</footer>

<script src="hw3.js"></script>

<!-- alert box-->
<div id="alert-box">
    <div id="alert-content">
        <h4>Please fill in all required fields.</h4>
        <button id="close-alert">Ok</button>
    </div>
</div>

</body>
</html>
